services:
  whisper-asr-webservice:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - ASR_MODEL=${ASR_MODEL:-large-v3}
      - HF_TOKEN=${HF_TOKEN:-}
      - COMPUTE_TYPE=${COMPUTE_TYPE:-}
      - DEVICE=${DEVICE:-}
      - UPLOAD_DIR=/data/uploads
    ports:
      - "9000:9000"
    volumes:
      - ./app:/app/app
      - cache-huggingface:/root/.cache/huggingface
      - cache-torch:/root/.cache/torch
      - uploads:/data/uploads

  whisper-asr-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - ASR_BACKEND_URL=http://whisper-asr-webservice:9000
    ports:
      - "9001:9001"
    depends_on:
      - whisper-asr-webservice
    volumes:
      - ./frontend:/app/frontend
    entrypoint: ["uv", "run", "uvicorn", "frontend.app:app", "--host", "0.0.0.0", "--port", "9001"]

volumes:
  cache-huggingface:
  cache-torch:
  uploads:
