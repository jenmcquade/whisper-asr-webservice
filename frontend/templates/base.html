<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Whisper ASR{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <span class="brand-mark">◉</span>
      <span class="brand-title">Whisper ASR</span>
      <span class="brand-sub">powered by WhisperX</span>
    </a>
    <nav class="topnav">
      <a href="/" class="nav-link">New transcript</a>
      <a href="{{ backend_url }}/docs" class="nav-link" target="_blank" rel="noopener">API Docs</a>
    </nav>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span class="muted">Runs locally. Nothing leaves your machine.</span>
  </footer>

  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
